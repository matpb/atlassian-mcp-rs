# Atlassian credentials are sent by MCP clients as HTTP headers — no credential env vars needed.
services:
  atlassian-mcp:
    build: .
    container_name: atlassian-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8432}:8432"
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8432"
      RUST_LOG: "${RUST_LOG:-atlassian_mcp=info}"
